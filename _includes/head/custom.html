{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- footer가 콘텐츠 끝에 자연스럽게 붙도록 강제 (jQuery의 bumpIt 무효화) -->
<style>
  body { margin-bottom: 0 !important; padding-bottom: 0 !important; }

  /* ───────── 전 페이지 공통 반응형 안정화 ───────── */

  /* 아바타: 어떤 폭에서도 정사각 원형 고정 (테마의 max-width:100% + 고정 height로 인한 찌그러짐 방지) */
  .author__avatar img {
    width: 150px !important;
    height: 150px !important;
    max-width: 150px !important;
    aspect-ratio: 1 / 1;
    object-fit: cover !important;
    object-position: top center !important;
    border-radius: 50% !important;
  }
  .sidebar .author__avatar {
    display: block !important;
    width: 150px !important;
    margin: 0 auto 1.2rem !important;
    text-align: center;
  }

  /* 연락처(이메일·전화·GitHub)는 항상 표시, 'Follow' 토글 버튼 숨김 */
  .author__urls-wrapper { display: block !important; }
  .author__urls-wrapper > button { display: none !important; }
  .author__urls {
    display: block !important;
    position: static !important;
    margin: 0 auto !important;
    border: 0 !important;
    box-shadow: none !important;
    background: transparent !important;
  }
  .author__urls::before { display: none !important; }
  .author__urls a { overflow-wrap: anywhere; word-break: break-word; }

  /* 좁은 화면(≤1024px): 사이드바가 본문 위로 깔끔히 쌓이고 가운데 정렬 */
  @media screen and (max-width: 1024px) {
    .sidebar {
      position: relative !important;
      top: auto !important;
      float: none !important;
      clear: both;
      width: 100% !important;
      max-width: 100% !important;
      margin-bottom: 2rem;
      padding-right: 0 !important;
    }
    .sidebar .author__content {
      display: block !important;
      text-align: center;
      padding: 0 !important;
    }
    .archive,
    .page {
      width: 100% !important;
      float: none !important;
      clear: both;
    }
    /* 표가 좁은 화면에서 넘칠 때 가로 스크롤 */
    table {
      display: block;
      width: 100%;
      overflow-x: auto;
    }
    img { max-width: 100%; height: auto; }
  }
</style>

<!-- end custom head snippets -->
